# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # Générer un numéro de version unique basé sur le commit SHA
      - name: Generate version number
        id: version
        run: echo "VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      
      # Remplacer les versions dans index.html et service-worker.js
      - name: Update cache busting version
        run: |
          # Obtenir le numéro de version
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "🚀 Deploying with version: $VERSION"
          
          # Remplacer v=2.0 par v=$VERSION dans index.html
          sed -i "s/v=2\.0/v=$VERSION/g" index.html
          
          # Remplacer CACHE_VERSION = 'v2.0' par CACHE_VERSION = 'v$VERSION' dans service-worker.js (si présent)
          if [ -f service-worker.js ]; then
            sed -i "s/CACHE_VERSION = 'v2\.0'/CACHE_VERSION = 'v$VERSION'/g" service-worker.js
          else
            echo "ℹ️ service-worker.js introuvable, étape ignorée"
          fi
          
          echo "✅ Version numbers updated to: $VERSION"
          
      # Injecter le Webhook Discord depuis les Secrets GitHub
      - name: Inject Discord Webhook
        run: |
          if [ -n "${{ secrets.DISCORD_WEBHOOK }}" ]; then
            sed -i "s|{{DISCORD_WEBHOOK}}|${{ secrets.DISCORD_WEBHOOK }}|g" js/config.js
            echo "✅ Discord Webhook injected"
            # Debug: Check if replacement happened (without showing secret)
            if grep -q "{{DISCORD_WEBHOOK}}" js/config.js; then
              echo "❌ ERROR: Placeholder {{DISCORD_WEBHOOK}} still exists in js/config.js"
              exit 1
            fi
          else
            echo "⚠️ DISCORD_WEBHOOK secret not found, skipping injection"
          fi
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
