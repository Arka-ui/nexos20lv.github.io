name: Visual Regression Tests

"on":
  push:
    branches:
      - main
    paths:
      - "css/**"
      - "js/**"
      - "assets/**"
      - "index.html"
      - "scripts/**"
      - ".github/workflows/visual-tests.yml"
  pull_request:
    branches:
      - main
    paths:
      - "css/**"
      - "js/**"
      - "assets/**"
      - "index.html"
      - "scripts/**"
      - ".github/workflows/visual-tests.yml"

jobs:
  visual-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies for visual scripts
        run: |
          npm init -y
          npm install --no-audit --no-fund puppeteer http-server

      - name: Start local server
        run: npx http-server -p 8080 -c-1 . &

      - name: Wait for server
        run: |
          timeout 30 bash -c 'until curl -fsS http://localhost:8080 > /dev/null; do sleep 1; done'

      - name: Run desktop screenshot tests
        run: node scripts/visual-tests/desktop-screenshots.js

      - name: Run mobile screenshot tests
        run: node scripts/visual-tests/mobile-screenshots.js

      - name: Run performance metrics check
        run: node scripts/performance/metrics-check.js

      - name: Upload visual artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-results
          path: test-results/
          if-no-files-found: warn
